name: Connector
on:
  push:
    paths: ["mcp-server/**", "plugins/**", ".github/workflows/connector.yml", "Dockerfile"]
  pull_request:
    paths: ["mcp-server/**", "plugins/**", ".github/workflows/connector.yml", "Dockerfile"]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: mcp-server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: mcp-server/package-lock.json }
      - run: npm ci
      - run: npm run check
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t annotatekit-mcp:test .
